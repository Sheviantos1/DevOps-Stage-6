name: Deploy TODO Application

on:
  push:
    branches: [ main ]

jobs:
  terraform:
    name: Terraform Plan/Apply
    runs-on: ubuntu-latest
    # REMOVE the environment line

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v2

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Create SSH key file
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
        chmod 600 ~/.ssh/id_rsa.pub

    - name: Terraform Init
      working-directory: infra/terraform
      run: terraform init

    - name: Terraform Format
      working-directory: infra/terraform
      run: terraform fmt -check

    - name: Terraform Validate
      working-directory: infra/terraform
      run: terraform validate

    - name: Terraform Plan
      working-directory: infra/terraform
      id: plan
      run: |
        terraform plan -no-color -input=false

    - name: Terraform Apply
      working-directory: infra/terraform
      run: terraform apply -auto-approve

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: terraform
    # REMOVE the environment line here too

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH key for deployment
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub
        chmod 600 ~/.ssh/id_rsa.pub

    - name: Get instance IP from Terraform output
      id: terraform-output
      run: |
        cd infra/terraform
        INSTANCE_IP=$(terraform output -raw instance_public_ip 2>/dev/null || echo "")
        echo "instance_ip=$INSTANCE_IP" >> $GITHUB_OUTPUT

    - name: Display deployment info
      run: |
        echo "🚀 Application deployment complete!"
        echo "📱 Your application will be available at: http://${{ steps.terraform-output.outputs.instance_ip }}"
        echo "⏳ It may take 2-3 minutes for all services to start"