server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/auth {
        proxy_pass http://auth-api:8081;
    }

    location /api/todos {
        proxy_pass http://todos-api:8082;
    }

    location /api/users {
        proxy_pass http://users-api:8083;
    }
}